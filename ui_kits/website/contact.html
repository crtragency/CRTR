<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/jpeg" href="./crtr-logo.jpg"/>
<title>CRTR. — Contact</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600;1,900&family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root {
  --red:#E5232C; --red-deep:#B81820; --red-darker:#7A0A10; --red-soft:#FFE7E8;
  --ink:#0B0B0C; --ink-2:#1A1A1C; --ink-3:#2A2A2D;
  --paper:#F4F1EC; --paper-2:#EAE6DF; --paper-3:#E8E4DA; --white:#FFFFFF;
  --gold:#F2C94C; --steel:#0F2438;
  --muted:#6B6A68; --muted-2:#A3A2A0;
  --bg:var(--paper); --border:var(--ink); --border-soft:rgba(11,11,12,.12); --accent:var(--red);
  --text-1:var(--ink); --text-2:var(--ink-2); --text-3:var(--muted);
  --font-display:'Archivo Black','Archivo',system-ui,sans-serif;
  --font-sans:'Archivo',system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
  --fs-display:clamp(56px,9vw,148px); --fs-h1:clamp(40px,6vw,84px);
  --fs-h2:clamp(32px,4.5vw,56px); --fs-h3:32px; --fs-h4:22px;
  --fs-h5:18px; --fs-h6:15px; --fs-lead:20px; --fs-body:16px;
  --fs-body-sm:15px; --fs-sm:14px; --fs-xs:12px; --fs-2xs:11px;
  --fw-regular:400; --fw-medium:500; --fw-semibold:600; --fw-bold:700; --fw-x:800; --fw-black:900;
  --lh-tight:0.95; --lh-snug:1.2; --lh-body:1.55;
  --ls-display:-0.03em; --ls-heading:-0.02em; --ls-eyebrow:0.08em; --ls-eyebrow-w:0.1em;
  --r-xs:6px; --r-sm:8px; --r-md:12px; --r-lg:18px; --r-xl:24px; --r-pill:999px;
  --bw-hair:1px; --bw:1.5px; --bw-bold:2px;
  --container:1320px; --gutter:32px; --gutter-sm:20px; --nav-h:72px;
  --shadow-hard-sm:3px 3px 0 var(--ink); --shadow-hard:4px 4px 0 var(--ink);
  --shadow-hard-lg:6px 6px 0 var(--ink); --shadow-hard-xl:8px 8px 0 var(--ink);
  --shadow-hard-inv:4px 4px 0 var(--paper); --shadow-hard-inv-sm:2px 2px 0 var(--paper);
  --ring:0 0 0 3px rgba(229,35,44,.30);
  --dur-fast:180ms; --dur-base:250ms; --dur-slow:400ms;
  --ease-ui:cubic-bezier(0.4,0,0.2,1); --ease-out:cubic-bezier(0.22,1,0.36,1);
  --ease-snap:cubic-bezier(0.2,0.9,0.3,1.2);
  --lift:translate(-2px,-2px); --lift-lg:translate(-3px,-3px);
}
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--font-sans);font-size:var(--fs-body);line-height:var(--lh-body);color:var(--text-1);background:var(--bg);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
h1,h2,h3,h4,h5,h6{margin:0;font-family:var(--font-display);font-weight:var(--fw-black);text-transform:uppercase;line-height:var(--lh-tight);letter-spacing:var(--ls-display);color:var(--text-1)}
p{margin:0;color:var(--text-2);line-height:var(--lh-body)}
button{font-family:var(--font-sans)}
.kit-wrap{max-width:var(--container);margin:0 auto;padding:0 var(--gutter)}
@media(max-width:640px){.kit-wrap{padding:0 var(--gutter-sm)}}
.kit-section{padding:120px 0;border-bottom:1.5px solid var(--ink)}
@media(max-width:780px){.kit-section{padding:80px 0}}
.kit-tag{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--red)}
.kit-tag::before{content:'/ ';color:var(--ink);opacity:.4}
.section-head{display:grid;grid-template-columns:1fr 1.2fr;gap:48px;align-items:end;margin-bottom:64px}
@media(max-width:780px){.section-head{grid-template-columns:1fr;gap:24px}}
.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:780px){.svc-grid{grid-template-columns:1fr}}
.foot-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr 1.2fr;gap:48px;margin-bottom:48px}
@media(max-width:880px){.foot-grid{grid-template-columns:1fr 1fr;gap:36px}}
@media(max-width:540px){.foot-grid{grid-template-columns:1fr}}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:480px){.form-row{grid-template-columns:1fr}}
/* ── marquee ── */
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-3px)}40%{transform:translateX(3px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
/* ── type grid ── */
.type-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
@media(max-width:900px){.type-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:560px){.type-grid{grid-template-columns:1fr 1fr}}
/* ── contact 2-col ── */
.contact-2col{display:grid;grid-template-columns:1fr 380px;gap:64px;align-items:start}
@media(max-width:1024px){.contact-2col{grid-template-columns:1fr;gap:48px}}
/* ── metric strip ── */
.metric-strip{display:grid;grid-template-columns:repeat(4,1fr);border-top:1.5px solid var(--ink);border-bottom:1.5px solid var(--ink)}
.metric{padding:36px 32px;border-right:1.5px solid var(--ink)}
.metric:last-child{border-right:none}
@media(max-width:720px){.metric-strip{grid-template-columns:1fr 1fr}.metric:nth-child(2){border-right:none}.metric:nth-child(-n+2){border-bottom:1.5px solid var(--ink)}}
/* ── hero grid ── */
@media(max-width:700px){.hero-grid{grid-template-columns:1fr !important}}
/* ── faq ── */
.faq-new-item{border-bottom:1.5px solid var(--ink)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect } = React;
const LOGO = './crtr-logo.jpg';

function Tag({ children, style, ...rest }) {
  return <span style={{ display:'inline-flex',alignItems:'center',fontFamily:'var(--font-mono)',fontSize:'var(--fs-2xs)',letterSpacing:'0.06em',textTransform:'uppercase',padding:'5px 10px',border:'1px solid currentColor',borderRadius:'var(--r-pill)',opacity:0.85,...style }} {...rest}>{children}</span>;
}
function Badge({ children, tone='paper', dot=false, style, ...rest }) {
  const tones = { paper:{background:'var(--paper-2)',color:'var(--ink)',border:'var(--bw) solid var(--ink)'}, ink:{background:'var(--ink)',color:'var(--paper)',border:'var(--bw) solid var(--ink)'}, red:{background:'var(--red)',color:'var(--white)',border:'var(--bw) solid var(--ink)'} };
  const dots = { paper:'var(--red)', ink:'#22c55e', red:'var(--white)' };
  return <span style={{ display:'inline-flex',alignItems:'center',gap:'8px',fontFamily:'var(--font-mono)',fontSize:'var(--fs-xs)',textTransform:'uppercase',letterSpacing:'var(--ls-eyebrow)',fontWeight:'var(--fw-medium)',padding:'6px 12px',borderRadius:'var(--r-pill)',...tones[tone],...style }} {...rest}>{dot&&<span style={{ width:6,height:6,borderRadius:'50%',background:dots[tone] }}/>}{children}</span>;
}
function Button({ children, variant='primary', size='md', iconRight=true, disabled=false, href, onClick, style, ...rest }) {
  const [h,setH]=useState(false); const [p,setP]=useState(false);
  const sizes = { sm:{padding:'10px 16px',fontSize:'var(--fs-sm)'}, md:{padding:'14px 22px',fontSize:'var(--fs-body-sm)'}, lg:{padding:'18px 30px',fontSize:'var(--fs-body)'} };
  const base = { fontFamily:'var(--font-sans)',fontWeight:'var(--fw-semibold)',display:'inline-flex',alignItems:'center',gap:'10px',borderRadius:'var(--r-pill)',border:'var(--bw) solid var(--ink)',cursor:disabled?'not-allowed':'pointer',opacity:disabled?0.45:1,textDecoration:'none',transition:'transform var(--dur-fast) var(--ease-snap),box-shadow var(--dur-fast) var(--ease-ui),background var(--dur-fast) var(--ease-ui),color var(--dur-fast) var(--ease-ui)',...sizes[size] };
  const variants = { primary:{background:'var(--red)',color:'var(--white)',boxShadow:h&&!disabled?'var(--shadow-hard-lg)':'var(--shadow-hard)'}, dark:{background:'var(--ink)',color:'var(--white)',boxShadow:h&&!disabled?'var(--shadow-hard-lg)':'var(--shadow-hard)'}, ghost:{background:h&&!disabled?'var(--ink)':'transparent',color:h&&!disabled?'var(--paper)':'var(--ink)',boxShadow:'none'} };
  const lift = !disabled&&h?{transform:p?'translate(0,0)':'var(--lift)'}:{};
  const arrow = <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true" style={{ transition:'transform var(--dur-base) var(--ease-out)',transform:h?'translateX(3px)':'none' }}><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  const El = href?'a':'button';
  return <El href={href} onClick={disabled?undefined:onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>{setH(false);setP(false)}} onMouseDown={()=>setP(true)} onMouseUp={()=>setP(false)} style={{ ...base,...variants[variant],...lift,...style }} {...rest}>{children}{iconRight&&variant!=='ghost'&&arrow}</El>;
}
function IconButton({ children, variant='outline', shape='circle', size=46, disabled=false, href, onClick, style, ...rest }) {
  const [h,setH]=useState(false);
  const base = { width:size,height:size,display:'inline-grid',placeItems:'center',borderRadius:shape==='circle'?'50%':'var(--r-sm)',border:'var(--bw) solid var(--ink)',cursor:disabled?'not-allowed':'pointer',opacity:disabled?0.45:1,transition:'transform var(--dur-fast) var(--ease-snap),background var(--dur-fast) var(--ease-ui),color var(--dur-fast) var(--ease-ui),box-shadow var(--dur-fast) var(--ease-ui)' };
  const variants = { outline:{background:h&&!disabled?'var(--red)':'var(--paper-2)',color:h&&!disabled?'var(--white)':'var(--ink)',borderColor:h&&!disabled?'var(--red)':'var(--ink)'}, solid:{background:'var(--ink)',color:'var(--paper)',boxShadow:h&&!disabled?'var(--shadow-hard-sm)':'none',transform:h&&!disabled?'var(--lift)':'none'} };
  const El = href?'a':'button';
  return <El href={href} onClick={disabled?undefined:onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{ ...base,...variants[variant],...style }} {...rest}>{children}</El>;
}
function BrandMark({ logoSrc, size=38, showWord=true, word='CRTR.', onInk=false, style, ...rest }) {
  const [err,setErr]=useState(false);
  return <span style={{ display:'inline-flex',alignItems:'center',gap:'12px',...style }} {...rest}><span style={{ width:size,height:size,borderRadius:'var(--r-sm)',background:'var(--red)',display:'grid',placeItems:'center',color:'#fff',fontFamily:'var(--font-display)',fontSize:size*0.37,border:'var(--bw) solid var(--ink)',boxShadow:onInk?'var(--shadow-hard-inv-sm)':'var(--shadow-hard-sm)',overflow:'hidden' }}>{logoSrc&&!err?<img src={logoSrc} alt="" onError={()=>setErr(true)} style={{ width:'100%',height:'100%',objectFit:'cover' }}/>:<span style={{ transform:'translateY(-1px)' }}>C.</span>}</span>{showWord&&<span style={{ fontFamily:'var(--font-display)',fontSize:size*0.53,letterSpacing:'-0.02em',color:onInk?'var(--paper)':'var(--ink)' }}>{word}</span>}</span>;
}
function NavLink({ href, children }) {
  const [h,setH]=useState(false);
  return <a href={href} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{ fontSize:'var(--fs-sm)',fontWeight:'var(--fw-medium)',color:h?'var(--red)':'inherit',transition:'color var(--dur-fast) var(--ease-ui)' }}>{children}</a>;
}
function NavBar({ logoSrc, links=[], cta='Booking — Q3', ctaHref='#', style, ...rest }) {
  return <header style={{ position:'sticky',top:0,zIndex:50,background:'var(--paper)',borderBottom:'var(--bw) solid var(--ink)',...style }} {...rest}><div style={{ maxWidth:'var(--container)',margin:'0 auto',padding:'0 var(--gutter)',height:'var(--nav-h)',display:'flex',alignItems:'center',justifyContent:'space-between' }}><a href="index.html" aria-label="CRTR."><BrandMark logoSrc={logoSrc} size={38}/></a><nav style={{ display:'flex',gap:'36px',alignItems:'center' }}>{links.map(l=><NavLink key={l.label} href={l.href}>{l.label}</NavLink>)}</nav><a href={ctaHref}><Badge tone="ink" dot>{cta}</Badge></a></div></header>;
}
function Input({ label, hint, error, type='text', id, style, ...rest }) {
  const [f,setF]=useState(false);
  const uid=id||(label?label.toLowerCase().replace(/\s+/g,'-'):undefined);
  return <div style={{ display:'flex',flexDirection:'column',gap:'8px',width:'100%' }}>{label&&<label htmlFor={uid} style={{ fontFamily:'var(--font-mono)',fontSize:'var(--fs-2xs)',textTransform:'uppercase',letterSpacing:'var(--ls-eyebrow)',color:'var(--muted)' }}>{label}</label>}<input id={uid} type={type} onFocus={()=>setF(true)} onBlur={()=>setF(false)} style={{ fontFamily:'var(--font-sans)',fontSize:'var(--fs-body-sm)',color:'var(--ink)',background:'var(--white)',border:`var(--bw) solid ${error?'var(--red)':'var(--ink)'}`,borderRadius:'var(--r-sm)',padding:'12px 14px',outline:'none',boxShadow:f?'var(--ring)':'none',transition:'box-shadow var(--dur-fast) var(--ease-ui)',width:'100%',...style }} {...rest}/>{(hint||error)&&<span style={{ fontSize:'var(--fs-2xs)',fontFamily:'var(--font-mono)',color:error?'var(--red)':'var(--muted)' }}>{error||hint}</span>}</div>;
}
function Textarea({ label, hint, error, rows=4, id, style, ...rest }) {
  const [f,setF]=useState(false);
  const uid=id||(label?label.toLowerCase().replace(/\s+/g,'-'):undefined);
  return <div style={{ display:'flex',flexDirection:'column',gap:'8px',width:'100%' }}>{label&&<label htmlFor={uid} style={{ fontFamily:'var(--font-mono)',fontSize:'var(--fs-2xs)',textTransform:'uppercase',letterSpacing:'var(--ls-eyebrow)',color:'var(--muted)' }}>{label}</label>}<textarea id={uid} rows={rows} onFocus={()=>setF(true)} onBlur={()=>setF(false)} style={{ fontFamily:'var(--font-sans)',fontSize:'var(--fs-body-sm)',lineHeight:'var(--lh-body)',color:'var(--ink)',background:'var(--white)',border:'var(--bw) solid var(--ink)',borderRadius:'var(--r-sm)',padding:'12px 14px',outline:'none',resize:'vertical',boxShadow:f?'var(--ring)':'none',transition:'box-shadow var(--dur-fast) var(--ease-ui)',width:'100%',...style }} {...rest}/>{(hint||error)&&<span style={{ fontSize:'var(--fs-2xs)',fontFamily:'var(--font-mono)',color:error?'var(--red)':'var(--muted)' }}>{error||hint}</span>}</div>;
}
function Stroke({ children, ink=true }) {
  return <span style={{ WebkitTextStroke:`1.5px var(--${ink?'ink':'paper'})`,color:'transparent' }}>{children}</span>;
}
function SectionHead({ tag, title, lede, onInk }) {
  return <div className="section-head"><div><span className="kit-tag">{tag}</span><h2 style={{ fontFamily:'var(--font-display)',fontSize:'clamp(40px,6vw,80px)',lineHeight:.95,letterSpacing:'-0.04em',textTransform:'uppercase',margin:'14px 0 0',color:onInk?'var(--paper)':'var(--ink)' }}>{title}</h2></div><p style={{ fontSize:18,color:onInk?'var(--muted-2)':'var(--muted)',maxWidth:480,lineHeight:1.55 }}>{lede}</p></div>;
}
function Footer() {
  const cols = [
    ['Studio',[['Work','work.html'],['Services','services.html'],['About','about.html'],['Contact','contact.html']]],
    ['Company',[['About','about.html'],['Careers','#'],['Press kit','#'],['Contact','contact.html']]],
    ['Get in touch',[['hello@crtr.studio','mailto:hello@crtr.studio'],['+1 (415) 555-0148','#'],['Lisbon · NYC · Remote','#']]],
  ];
  return (
    <footer style={{ background:'var(--ink)',color:'var(--paper)',padding:'64px 0 32px' }}>
      <div className="kit-wrap">
        <div className="foot-grid">
          <div>
            <a href="index.html" style={{ display:'inline-block',marginBottom:16 }}><BrandMark logoSrc={LOGO} onInk size={40}/></a>
            <p style={{ color:'var(--muted-2)',fontSize:14,lineHeight:1.6,maxWidth:300,marginBottom:20 }}>A four-person creative agency working on video, motion, web and graphic design for ambitious teams worldwide.</p>
            <div style={{ display:'flex',gap:10 }}>{['IG','X','YT','VM'].map(s=><IconButton key={s} size={36} aria-label={s} style={{ background:'transparent',color:'var(--paper)',borderColor:'var(--ink-3)',fontSize:11,fontFamily:'var(--font-mono)' }}>{s}</IconButton>)}</div>
          </div>
          {cols.map(([h,links])=>(
            <div key={h}>
              <h4 style={{ fontFamily:'var(--font-mono)',fontSize:11,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--red)',margin:'0 0 16px' }}>{h}</h4>
              <ul style={{ listStyle:'none',padding:0,margin:0,display:'flex',flexDirection:'column',gap:10 }}>
                {links.map(([l,href])=><li key={l}><a href={href} style={{ fontSize:14,color:'var(--paper)' }}>{l}</a></li>)}
              </ul>
            </div>
          ))}
        </div>
        <div style={{ borderTop:'1px solid var(--ink-3)',paddingTop:24,display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:16,fontFamily:'var(--font-mono)',fontSize:12,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em' }}>
          <span>© 2026 CRTR. Creative Agency. All rights reserved.</span>
          <span>Made on a Tuesday.</span>
        </div>
      </div>
    </footer>
  );
}

/* ─── CHROME ─── */
const NAV_LINKS = [
  { label:'Home',     href:'index.html' },
  { label:'Work',     href:'work.html' },
  { label:'Services', href:'services.html' },
  { label:'Studio',   href:'about.html' },
  { label:'Contact',  href:'contact.html' },
];
function SiteNav() { return <NavBar logoSrc={LOGO} links={NAV_LINKS} cta="Booking — Q3" ctaHref="contact.html"/>; }

/* ── PAGE SECTIONS ── */

const TICKER_TEXT = 'Q3 2026  ·  2 SLOTS OPEN  ·  VIDEO  ·  MOTION  ·  WEB  ·  GRAPHIC DESIGN  ·  CRTR CREATIVE AGENCY  ·  REPLY IN UNDER 24H  ·  ';

function Ticker() {
  const repeated = TICKER_TEXT.repeat(6);
  return (
    <div style={{ background:'var(--red)', borderBottom:'1.5px solid var(--ink)', overflow:'hidden', padding:'10px 0', position:'relative' }}>
      <div style={{ display:'flex', whiteSpace:'nowrap', animation:'marquee 22s linear infinite' }}>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:11, letterSpacing:'0.1em', textTransform:'uppercase', color:'#fff' }}>{repeated}</span>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:11, letterSpacing:'0.1em', textTransform:'uppercase', color:'#fff' }}>{repeated}</span>
      </div>
    </div>
  );
}

function PageHero() {
  return (
    <section style={{ background:'var(--ink)', borderBottom:'1.5px solid var(--ink)', padding:'72px 0 64px' }}>
      <div className="kit-wrap">
        <div style={{ fontFamily:'var(--font-mono)', fontSize:12, textTransform:'uppercase', letterSpacing:'.1em', color:'var(--red)' }}>/ Contact</div>
        <h1 style={{ fontFamily:'var(--font-display)', fontSize:'clamp(26px,4.5vw,62px)', lineHeight:.88, letterSpacing:'-0.045em', textTransform:'uppercase', margin:'20px 0 0' }}>
          <span style={{ display:'block', color:'var(--paper)' }}>Got a thing?</span>
          <span style={{ display:'block', color:'var(--red)' }}>{"Let's make it."}</span>
        </h1>
        <p style={{ fontSize:17, color:'var(--muted-2)', lineHeight:1.65, maxWidth:520, marginTop:28 }}>
          Tell us what you are working on. First reply in under a day — usually a lot less. No forms-to-nowhere; a real person reads every one.
        </p>
      </div>
    </section>
  );
}

const SERVICE_TYPES = [
  { key:'video',   label:'Video',        sub:'YouTube · Ads · Films' },
  { key:'motion',  label:'Motion',       sub:'Animation · Explainers' },
  { key:'web',     label:'Web',          sub:'Sites · Landing pages' },
  { key:'design',  label:'Design',       sub:'Identity · Packaging' },
  { key:'all',     label:'Everything',   sub:'All four crafts' },
];
const BUDGET_OPTIONS = ['< $10K', '$10–25K', '$25–50K', '$50K+'];

function TypePicker({ selected, onSelect }) {
  return (
    <div>
      <label style={{ display:'block', fontFamily:'var(--font-mono)', fontSize:'var(--fs-2xs)', textTransform:'uppercase', letterSpacing:'var(--ls-eyebrow)', color:'var(--muted)', marginBottom:10 }}>What do you need?</label>
      <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
        {SERVICE_TYPES.map(({ key, label }) => {
          const active = selected.includes(key);
          const [hov, setHov] = useState(false);
          return (
            <button key={key} onClick={() => onSelect(key)}
              onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
              style={{
                fontFamily:'var(--font-mono)', fontSize:11, textTransform:'uppercase', letterSpacing:'.06em',
                padding:'8px 16px',
                border: `1.5px solid ${active ? 'var(--red)' : 'var(--ink)'}`,
                borderRadius:'var(--r-pill)',
                cursor:'pointer',
                background: active ? 'var(--red)' : hov ? 'var(--paper-2)' : 'transparent',
                color: active ? '#fff' : 'var(--ink)',
                transition:'all var(--dur-fast) var(--ease-ui)',
                fontWeight: 500,
              }}>{label}</button>
          );
        })}
      </div>
    </div>
  );
}

function BudgetPicker({ selected, onSelect }) {
  return (
    <div>
      <label style={{ display:'block', fontFamily:'var(--font-mono)', fontSize:'var(--fs-2xs)', textTransform:'uppercase', letterSpacing:'var(--ls-eyebrow)', color:'var(--muted)', marginBottom:10 }}>Budget</label>
      <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
        {BUDGET_OPTIONS.map(b => {
          const active = selected === b;
          const [hov, setHov] = useState(false);
          return (
            <button key={b} onClick={() => onSelect(active ? null : b)}
              onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
              style={{
                fontFamily:'var(--font-mono)', fontSize:11, textTransform:'uppercase', letterSpacing:'.06em',
                padding:'8px 16px',
                border: `1.5px solid ${active ? 'var(--red)' : hov ? 'var(--ink)' : 'var(--border-soft)'}`,
                borderRadius:'var(--r-pill)',
                cursor:'pointer',
                background: active ? 'var(--red)' : hov ? 'var(--paper-2)' : 'transparent',
                color: active ? '#fff' : 'var(--ink)',
                transition:'all var(--dur-fast) var(--ease-ui)',
              }}>{b}</button>
          );
        })}
      </div>
    </div>
  );
}

function SidebarCard() {
  const filled = 4; const total = 6; const open = total - filled;
  return (
    <div style={{ background:'var(--ink)', border:'1.5px solid var(--ink)', borderRadius:'var(--r-xl)', overflow:'hidden', boxShadow:'8px 8px 0 rgba(11,11,12,.18)' }}>
      {/* Email */}
      <div style={{ padding:'28px 28px 24px', borderBottom:'1px solid var(--ink-3)' }}>
        <div style={{ fontFamily:'var(--font-mono)', fontSize:10, textTransform:'uppercase', letterSpacing:'.1em', color:'var(--red)', marginBottom:10 }}>Email us directly</div>
        <a href="mailto:hello@crtr.studio" style={{ fontFamily:'var(--font-display)', fontSize:20, letterSpacing:'-0.02em', textTransform:'uppercase', color:'var(--paper)', display:'block', marginBottom:6, lineHeight:1.1 }}>hello@crtr.studio</a>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:10, color:'var(--muted-2)', letterSpacing:'.04em' }}>Reply guaranteed in under 24h</span>
      </div>
      {/* Slots */}
      <div style={{ padding:'24px 28px', borderBottom:'1px solid var(--ink-3)' }}>
        <div style={{ fontFamily:'var(--font-mono)', fontSize:10, textTransform:'uppercase', letterSpacing:'.1em', color:'var(--red)', marginBottom:14 }}>Q3 Availability</div>
        <div style={{ display:'flex', gap:5, marginBottom:10 }}>
          {[...Array(total)].map((_,i) => (
            <div key={i} style={{ flex:1, height:5, borderRadius:3, background: i < filled ? 'var(--ink-3)' : 'var(--red)' }}/>
          ))}
        </div>
        <div style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--muted-2)' }}>
          <span style={{ color:'#fff', fontWeight:700 }}>{open} slots open</span> · {filled} of {total} taken
        </div>
      </div>
      {/* Locations */}
      <div style={{ padding:'24px 28px', borderBottom:'1px solid var(--ink-3)' }}>
        <div style={{ fontFamily:'var(--font-mono)', fontSize:10, textTransform:'uppercase', letterSpacing:'.1em', color:'var(--red)', marginBottom:14 }}>Where we are</div>
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {[['Lisbon, PT','GMT +1'],['New York, NY','GMT −5'],['Remote','Anywhere']].map(([city,tz]) => (
            <div key={city} style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span style={{ color:'var(--paper)', fontSize:14, fontWeight:500 }}>{city}</span>
              <span style={{ fontFamily:'var(--font-mono)', fontSize:10, color:'var(--muted)', letterSpacing:'.04em' }}>{tz}</span>
            </div>
          ))}
        </div>
      </div>
      {/* Socials */}
      <div style={{ padding:'20px 28px', borderBottom:'1px solid var(--ink-3)', display:'flex', gap:8 }}>
        {[['IG','https://instagram.com'],['X','https://x.com'],['YT','https://youtube.com'],['VM','https://vimeo.com']].map(([s,href]) => (
          <a key={s} href={href} style={{ width:34, height:34, borderRadius:6, border:'1px solid var(--ink-3)', display:'grid', placeItems:'center', fontFamily:'var(--font-mono)', fontSize:10, color:'var(--muted-2)', letterSpacing:'.04em', textDecoration:'none', transition:'all var(--dur-fast) var(--ease-ui)' }}
            onMouseEnter={e=>{ e.currentTarget.style.borderColor='var(--red)'; e.currentTarget.style.color='var(--red)'; }}
            onMouseLeave={e=>{ e.currentTarget.style.borderColor='var(--ink-3)'; e.currentTarget.style.color='var(--muted-2)'; }}>
            {s}
          </a>
        ))}
      </div>
      {/* Testimonial */}
      <div style={{ padding:'24px 28px' }}>
        <div style={{ fontFamily:'var(--font-mono)', fontSize:10, textTransform:'uppercase', letterSpacing:'.1em', color:'var(--muted)', marginBottom:12 }}>A client said—</div>
        <p style={{ color:'var(--muted-2)', fontSize:13, lineHeight:1.7, fontStyle:'italic', margin:'0 0 12px' }}>
          "CRTR shipped our entire rebrand in four weeks — better than what we'd spent six months briefing another agency on."
        </p>
        <div style={{ fontFamily:'var(--font-mono)', fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em' }}>— Maya R., Founder · Vanta Studio</div>
      </div>
    </div>
  );
}

function ContactSection() {
  const [types, setTypes] = useState([]);
  const [budget, setBudget] = useState(null);
  const [sent, setSent] = useState(false);
  return (
    <section className="kit-section">
      <div className="kit-wrap">
        {sent ? (
          <div style={{ textAlign:'center', padding:'80px 0', maxWidth:640, margin:'0 auto' }}>
            <div style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--red)', letterSpacing:'.1em', textTransform:'uppercase', marginBottom:20 }}>/ Brief received</div>
            <h2 style={{ fontFamily:'var(--font-display)', fontSize:'clamp(56px,9vw,120px)', lineHeight:.88, letterSpacing:'-0.045em', textTransform:'uppercase', margin:'0 0 28px' }}>
              Talk<br/><Stroke>soon.</Stroke>
            </h2>
            <p style={{ fontSize:18, color:'var(--muted)', marginBottom:40, lineHeight:1.6 }}>
              First reply in under a day — usually a lot less. Check your inbox.
            </p>
            <div style={{ display:'flex', gap:12, justifyContent:'center', flexWrap:'wrap' }}>
              <Button variant="dark" href="index.html">Back to home</Button>
              <Button variant="ghost" href="work.html">See our work</Button>
            </div>
          </div>
        ) : (
          <div className="contact-2col">
            <div style={{ background:'var(--paper)', border:'1.5px solid var(--ink)', borderRadius:'var(--r-xl)', padding:40, boxShadow:'6px 6px 0 var(--ink)' }}>
              <div className="form-row" style={{ marginBottom:20 }}>
                <Input label="Name" placeholder="Jane Maker"/>
                <Input label="Email" type="email" placeholder="you@studio.com"/>
              </div>
              <div style={{ marginBottom:20 }}>
                <TypePicker selected={types} onSelect={key => setTypes(prev => prev.includes(key) ? prev.filter(k=>k!==key) : [...prev, key])}/>
              </div>
              <div style={{ marginBottom:20 }}>
                <BudgetPicker selected={budget} onSelect={setBudget}/>
              </div>
              <div style={{ marginBottom:32 }}>
                <Textarea label="Tell us about the project" rows={5} placeholder="A launch film, a new site, a full rebrand…"/>
              </div>
              <div style={{ display:'flex', justifyContent:'flex-end' }}>
                <Button variant="primary" size="lg" onClick={() => setSent(true)}>Send brief</Button>
              </div>
            </div>
            <div style={{ position:'sticky', top:96 }}>
              <SidebarCard/>
            </div>
          </div>
        )}
      </div>
    </section>
  );
}

function MetricCard({ val, label, sub }) {
  const [hov, setHov] = useState(false);
  return (
    <div className="metric"
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        background: hov ? 'var(--ink)' : 'transparent',
        transition: 'background var(--dur-base) var(--ease-ui)',
        animation: hov ? 'shake 0.45s ease-in-out' : 'none',
        cursor: 'default',
      }}>
      <div style={{ fontFamily:'var(--font-display)', fontSize:'clamp(28px,3.5vw,48px)', lineHeight:.9, letterSpacing:'-0.03em', textTransform:'uppercase', color: hov ? 'var(--red)' : 'var(--ink)', marginBottom:10, transition:'color var(--dur-base) var(--ease-ui)' }}>{val}</div>
      <div style={{ fontWeight:600, fontSize:15, color: hov ? 'var(--paper)' : 'var(--ink)', marginBottom:4, transition:'color var(--dur-base) var(--ease-ui)' }}>{label}</div>
      <div style={{ fontFamily:'var(--font-mono)', fontSize:10, color: hov ? 'var(--muted-2)' : 'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em', transition:'color var(--dur-base) var(--ease-ui)' }}>{sub}</div>
    </div>
  );
}

function TrustStrip() {
  const metrics = [
    { val:'47',     label:'Projects delivered', sub:'Since 2021' },
    { val:'4 wks',  label:'Average timeline',   sub:'Start to ship' },
    { val:'$0',     label:'Surprise invoices',  sub:'Fixed-fee always' },
    { val:'18',     label:'Countries',          sub:'Where our work lives' },
  ];
  return (
    <section style={{ borderBottom:'1.5px solid var(--ink)' }}>
      <div className="kit-wrap" style={{ padding:0 }}>
        <div className="metric-strip">
          {metrics.map(m => <MetricCard key={m.label} {...m}/>)}
        </div>
      </div>
    </section>
  );
}

const FAQS = [
  ["What's your typical project timeline?", "Four weeks start to finish for most projects. Larger brand systems or multi-page sites can run 6–8 weeks. We'll tell you before we start, and we don't move the date."],
  ["How much does a project cost?", "Video and motion projects start around $4,000. Web projects from $8,000. Full brand systems from $12,000. We quote fixed-fee, not hourly."],
  ["Can I hire you for just one thing?", "Yes. We're happy to do a single deliverable — a logo animation, a landing page, a one-minute film. You don't have to hand us the whole thing."],
  ["Do you work with startups?", "All the time. About half our clients are pre-Series A. We know how to move fast, scope tight, and deliver something real on a startup budget."],
  ["What's the first step?", "Fill out the brief above or email hello@crtr.studio. We reply in under a day, usually a lot less."],
];
function FaqItem({ n, q, a }) {
  const [open, setOpen] = useState(false);
  const [hov, setHov] = useState(false);
  return (
    <div className="faq-new-item">
      <button
        onClick={() => setOpen(v => !v)}
        onMouseEnter={() => setHov(true)}
        onMouseLeave={() => setHov(false)}
        style={{
          width:'100%', background:'none', border:'none',
          padding:'26px 0', cursor:'pointer',
          display:'grid', gridTemplateColumns:'56px 1fr 44px',
          gap:'12px', alignItems:'center', textAlign:'left',
        }}>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:12, color:open?'var(--red)':'var(--muted)', letterSpacing:'.06em', transition:'color var(--dur-base) var(--ease-ui)' }}>{String(n).padStart(2,'0')}</span>
        <h4 style={{ fontFamily:'var(--font-display)', fontSize:'clamp(16px,1.8vw,22px)', textTransform:'uppercase', letterSpacing:'-0.01em', margin:0, color:(open||hov)?'var(--red)':'var(--ink)', transition:'color var(--dur-base) var(--ease-ui)' }}>{q}</h4>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:24, color:'var(--red)', transform:open?'rotate(45deg)':'none', transition:'transform .3s var(--ease-out)', display:'block', textAlign:'center', lineHeight:1 }}>+</span>
      </button>
      <div style={{ overflow:'hidden', maxHeight:open?240:0, transition:'max-height .4s var(--ease-out)', paddingLeft:68 }}>
        <p style={{ fontSize:15, color:'var(--muted)', lineHeight:1.7, paddingBottom:26 }}>{a}</p>
      </div>
    </div>
  );
}
function Faq() {
  return (
    <section className="kit-section">
      <div className="kit-wrap">
        <SectionHead tag="FAQ" title={<>Questions,<br/><Stroke>answered.</Stroke></>} lede="The ones we get every time. If yours isn't here, just email us."/>
        <div style={{ borderTop:'1.5px solid var(--ink)' }}>
          {FAQS.map(([q,a],i) => <FaqItem key={q} n={i+1} q={q} a={a}/>)}
        </div>
      </div>
    </section>
  );
}

function App() {
  return <><SiteNav/><PageHero/><ContactSection/><TrustStrip/><Faq/><Footer/></>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
