<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/jpeg" href="./crtr-logo.jpg"/>
<title>CRTR. — Creative Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600;1,900&family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root {
  --red:#E5232C; --red-deep:#B81820; --red-darker:#7A0A10; --red-soft:#FFE7E8;
  --ink:#0B0B0C; --ink-2:#1A1A1C; --ink-3:#2A2A2D;
  --paper:#F4F1EC; --paper-2:#EAE6DF; --paper-3:#E8E4DA; --white:#FFFFFF;
  --gold:#F2C94C; --steel:#0F2438;
  --muted:#6B6A68; --muted-2:#A3A2A0;
  --bg:var(--paper); --surface-card:var(--paper); --border:var(--ink);
  --border-soft:rgba(11,11,12,.12); --accent:var(--red);
  --text-1:var(--ink); --text-2:var(--ink-2); --text-3:var(--muted);
  --font-display:'Archivo Black','Archivo',system-ui,sans-serif;
  --font-sans:'Archivo',system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
  --fs-display:clamp(56px,9vw,148px); --fs-h1:clamp(40px,6vw,84px);
  --fs-h2:clamp(32px,4.5vw,56px); --fs-h3:32px; --fs-h4:22px;
  --fs-h5:18px; --fs-h6:15px; --fs-lead:20px; --fs-body:16px;
  --fs-body-sm:15px; --fs-sm:14px; --fs-xs:12px; --fs-2xs:11px;
  --fw-regular:400; --fw-medium:500; --fw-semibold:600;
  --fw-bold:700; --fw-x:800; --fw-black:900;
  --lh-monolith:0.92; --lh-tight:0.95; --lh-heading:1.1;
  --lh-snug:1.2; --lh-body:1.55;
  --ls-monolith:-0.045em; --ls-display:-0.03em; --ls-heading:-0.02em;
  --ls-eyebrow:0.08em; --ls-eyebrow-w:0.1em;
  --r-xs:6px; --r-sm:8px; --r-md:12px; --r-lg:18px; --r-xl:24px; --r-pill:999px;
  --bw-hair:1px; --bw:1.5px; --bw-bold:2px;
  --container:1320px; --gutter:32px; --gutter-sm:20px; --nav-h:72px;
  --shadow-hard-sm:3px 3px 0 var(--ink); --shadow-hard:4px 4px 0 var(--ink);
  --shadow-hard-lg:6px 6px 0 var(--ink); --shadow-hard-xl:8px 8px 0 var(--ink);
  --shadow-hard-inv:4px 4px 0 var(--paper); --shadow-hard-inv-sm:2px 2px 0 var(--paper);
  --shadow-ambient:0 1px 3px rgba(11,11,12,.10); --shadow-pop:0 8px 30px rgba(11,11,12,.18);
  --ring:0 0 0 3px rgba(229,35,44,.30); --ring-ink:0 0 0 3px rgba(11,11,12,.18);
  --dur-instant:120ms; --dur-fast:180ms; --dur-base:250ms;
  --dur-slow:400ms; --dur-reveal:600ms; --dur-cine:900ms;
  --ease-ui:cubic-bezier(0.4,0,0.2,1); --ease-out:cubic-bezier(0.22,1,0.36,1);
  --ease-in-out:cubic-bezier(0.65,0,0.35,1); --ease-snap:cubic-bezier(0.2,0.9,0.3,1.2);
  --lift:translate(-2px,-2px); --lift-lg:translate(-3px,-3px);
}
*,*::before,*::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { margin:0; font-family:var(--font-sans); font-size:var(--fs-body); line-height:var(--lh-body); color:var(--text-1); background:var(--bg); -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
a { color:inherit; text-decoration:none; }
img { display:block; max-width:100%; }
h1,h2,h3,h4,h5,h6 { margin:0; font-family:var(--font-display); font-weight:var(--fw-black); text-transform:uppercase; line-height:var(--lh-tight); letter-spacing:var(--ls-display); color:var(--text-1); }
h1{font-size:var(--fs-h1)} h2{font-size:var(--fs-h2)} h3{font-size:var(--fs-h3)} h4{font-size:var(--fs-h4)}
p { margin:0; color:var(--text-2); line-height:var(--lh-body); }

.kit-wrap { max-width:var(--container); margin:0 auto; padding:0 var(--gutter); }
@media(max-width:640px){.kit-wrap{padding:0 var(--gutter-sm)}}
.kit-section { padding:120px 0; border-bottom:1.5px solid var(--ink); }
@media(max-width:780px){.kit-section{padding:80px 0}}
.kit-tag { font-family:var(--font-mono); font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:var(--red); }
.kit-tag::before { content:'/ '; color:var(--ink); opacity:.4; }

.section-head { display:grid; grid-template-columns:1fr 1.2fr; gap:48px; align-items:end; margin-bottom:64px; }
@media(max-width:780px){.section-head{grid-template-columns:1fr;gap:24px}}

.hero-eyebrow { display:flex; justify-content:space-between; align-items:center; height:48px; border-bottom:1px solid rgba(11,11,12,.1); }
.hero-headline { padding:52px 0 0; }
.hero-info-bar { display:grid; grid-template-columns:1.6fr 1fr 1fr; gap:0; border-top:1.5px solid var(--ink); margin-top:44px; padding-top:36px; padding-bottom:80px; align-items:start; }
.hero-info-col { padding-right:44px; }
.hero-stat-col { border-left:1.5px solid var(--ink); padding-left:40px; padding-right:40px; display:flex; flex-direction:column; gap:26px; }
.hero-svc-col { border-left:1.5px solid var(--ink); padding-left:40px; }
@media(max-width:1024px){.hero-info-bar{grid-template-columns:1fr 1fr}.hero-svc-col{display:none}}
@media(max-width:700px){.hero-info-bar{grid-template-columns:1fr}.hero-stat-col{border-left:none;border-top:1.5px solid var(--ink);padding-left:0;padding-top:28px;margin-top:28px;flex-direction:row;flex-wrap:wrap;gap:28px}}

.svc-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
@media(max-width:780px){.svc-grid{grid-template-columns:1fr}}
.work-grid { display:grid; grid-template-columns:repeat(6,1fr); grid-auto-rows:200px; gap:18px; }
@media(max-width:880px){.work-grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:180px}.work-grid>*{grid-column:span 2!important;grid-row:span 1!important}}
.steps-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:0; border-top:1px solid var(--ink-3); border-bottom:1px solid var(--ink-3); }
.step { padding:36px 28px; border-right:1px solid var(--ink-3); }
.step:last-child { border-right:none; }
@media(max-width:880px){.steps-grid{grid-template-columns:1fr 1fr}.step:nth-child(2){border-right:none}.step:nth-child(-n+2){border-bottom:1px solid var(--ink-3)}}
@media(max-width:540px){.steps-grid{grid-template-columns:1fr}.step{border-right:none;border-bottom:1px solid var(--ink-3)}}
.testi-grid { display:grid; grid-template-columns:1.5fr 1fr; gap:48px; align-items:start; }
@media(max-width:880px){.testi-grid{grid-template-columns:1fr}}

.cta { padding:140px 0; background:var(--red); color:#fff; border-bottom:1.5px solid var(--ink); position:relative; overflow:hidden; }
.cta::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(135deg,transparent 0 28px,rgba(0,0,0,.06) 28px 29px); pointer-events:none; }
.cta-inner { position:relative; text-align:center; max-width:980px; margin:0 auto; padding:0 32px; }

.foot-grid { display:grid; grid-template-columns:1.6fr 1fr 1fr 1.2fr; gap:48px; margin-bottom:48px; }
@media(max-width:880px){.foot-grid{grid-template-columns:1fr 1fr;gap:36px}}
@media(max-width:540px){.foot-grid{grid-template-columns:1fr}}

@keyframes crtr-marq { from{transform:translateX(0)} to{transform:translateX(-50%)} }
@keyframes crtr-wave1 { 0%,100%{transform:translate(0,0) scale(1)} 25%{transform:translate(60px,-50px) scale(1.08)} 50%{transform:translate(-30px,45px) scale(0.94)} 75%{transform:translate(50px,22px) scale(1.05)} }
@keyframes crtr-wave2 { 0%,100%{transform:translate(0,0) scale(1)} 30%{transform:translate(-65px,38px) scale(1.1)} 60%{transform:translate(42px,-52px) scale(0.91)} 80%{transform:translate(-22px,-18px) scale(1.04)} }
@keyframes crtr-wave3 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(32px,-34px) scale(1.07)} 66%{transform:translate(-42px,22px) scale(0.95)} }
.crtr-marquee-track:hover { animation-play-state:paused; }
@media(prefers-reduced-motion:reduce){.crtr-marquee-track,.crtr-blob{animation:none!important}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const LOGO = './crtr-logo.jpg';

/* ─── PRIMITIVES ─── */

function Tag({ children, style, ...rest }) {
  return (
    <span style={{ display:'inline-flex', alignItems:'center', fontFamily:'var(--font-mono)', fontSize:'var(--fs-2xs)', letterSpacing:'0.06em', textTransform:'uppercase', padding:'5px 10px', border:'1px solid currentColor', borderRadius:'var(--r-pill)', opacity:0.85, ...style }} {...rest}>
      {children}
    </span>
  );
}

function Badge({ children, tone = 'paper', dot = false, style, ...rest }) {
  const tones = {
    paper: { background:'var(--paper-2)', color:'var(--ink)', border:'var(--bw) solid var(--ink)' },
    ink:   { background:'var(--ink)',     color:'var(--paper)', border:'var(--bw) solid var(--ink)' },
    red:   { background:'var(--red)',     color:'var(--white)', border:'var(--bw) solid var(--ink)' },
    softred:{ background:'var(--red-soft)', color:'var(--red-deep)', border:'var(--bw) solid var(--red-deep)' },
  };
  const dotColors = { paper:'var(--red)', ink:'#22c55e', red:'var(--white)', softred:'var(--red)' };
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:'8px', fontFamily:'var(--font-mono)', fontSize:'var(--fs-xs)', textTransform:'uppercase', letterSpacing:'var(--ls-eyebrow)', fontWeight:'var(--fw-medium)', padding:'6px 12px', borderRadius:'var(--r-pill)', ...tones[tone], ...style }} {...rest}>
      {dot && <span style={{ width:6, height:6, borderRadius:'50%', background:dotColors[tone], boxShadow:tone==='ink'?'0 0 0 3px rgba(34,197,94,.25)':'none' }} />}
      {children}
    </span>
  );
}

function Button({ children, variant = 'primary', size = 'md', iconRight = true, disabled = false, href, onClick, style, ...rest }) {
  const [hover, setHover] = useState(false);
  const [press, setPress] = useState(false);
  const sizes = {
    sm:{ padding:'10px 16px', fontSize:'var(--fs-sm)' },
    md:{ padding:'14px 22px', fontSize:'var(--fs-body-sm)' },
    lg:{ padding:'18px 30px', fontSize:'var(--fs-body)' },
  };
  const base = { fontFamily:'var(--font-sans)', fontWeight:'var(--fw-semibold)', display:'inline-flex', alignItems:'center', gap:'10px', borderRadius:'var(--r-pill)', border:'var(--bw) solid var(--ink)', cursor:disabled?'not-allowed':'pointer', opacity:disabled?0.45:1, textDecoration:'none', transition:'transform var(--dur-fast) var(--ease-snap),box-shadow var(--dur-fast) var(--ease-ui),background var(--dur-fast) var(--ease-ui),color var(--dur-fast) var(--ease-ui)', ...sizes[size] };
  const variants = {
    primary:{ background:'var(--red)', color:'var(--white)', boxShadow:hover&&!disabled?'var(--shadow-hard-lg)':'var(--shadow-hard)' },
    dark:   { background:'var(--ink)', color:'var(--white)', boxShadow:hover&&!disabled?'var(--shadow-hard-lg)':'var(--shadow-hard)' },
    ghost:  { background:hover&&!disabled?'var(--ink)':'transparent', color:hover&&!disabled?'var(--paper)':'var(--ink)', boxShadow:'none' },
  };
  const lift = !disabled&&hover ? { transform:press?'translate(0,0)':'var(--lift)' } : {};
  const arrow = (
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true" style={{ transition:'transform var(--dur-base) var(--ease-out)', transform:hover?'translateX(3px)':'none' }}>
      <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
  const El = href ? 'a' : 'button';
  return (
    <El href={href} onClick={disabled?undefined:onClick}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>{setHover(false);setPress(false);}}
      onMouseDown={()=>setPress(true)} onMouseUp={()=>setPress(false)}
      style={{ ...base, ...variants[variant], ...lift, ...style }} {...rest}>
      {children}
      {iconRight && variant !== 'ghost' && arrow}
    </El>
  );
}

function IconButton({ children, variant = 'outline', shape = 'circle', size = 46, disabled = false, href, onClick, style, ...rest }) {
  const [hover, setHover] = useState(false);
  const base = { width:size, height:size, display:'inline-grid', placeItems:'center', borderRadius:shape==='circle'?'50%':'var(--r-sm)', border:'var(--bw) solid var(--ink)', cursor:disabled?'not-allowed':'pointer', opacity:disabled?0.45:1, transition:'transform var(--dur-fast) var(--ease-snap),background var(--dur-fast) var(--ease-ui),color var(--dur-fast) var(--ease-ui),box-shadow var(--dur-fast) var(--ease-ui)' };
  const variants = {
    outline:{ background:hover&&!disabled?'var(--red)':'var(--paper-2)', color:hover&&!disabled?'var(--white)':'var(--ink)', borderColor:hover&&!disabled?'var(--red)':'var(--ink)' },
    solid:  { background:'var(--ink)', color:'var(--paper)', boxShadow:hover&&!disabled?'var(--shadow-hard-sm)':'none', transform:hover&&!disabled?'var(--lift)':'none' },
    red:    { background:'var(--red)', color:'var(--white)', borderColor:'var(--ink)', boxShadow:hover&&!disabled?'var(--shadow-hard-sm)':'none', transform:hover&&!disabled?'var(--lift)':'none' },
  };
  const El = href ? 'a' : 'button';
  return (
    <El href={href} onClick={disabled?undefined:onClick}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{ ...base, ...variants[variant], ...style }} {...rest}>
      {children}
    </El>
  );
}

function Card({ children, interactive = true, padding = 24, tone = 'paper', style, ...rest }) {
  const [hover, setHover] = useState(false);
  const tones = { paper:{ background:'var(--paper)', color:'var(--ink)' }, ink:{ background:'var(--ink)', color:'var(--paper)' }, red:{ background:'var(--red)', color:'var(--white)' } };
  return (
    <div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{ border:'var(--bw) solid var(--ink)', borderRadius:'var(--r-lg)', padding, transition:'transform var(--dur-base) var(--ease-out),box-shadow var(--dur-base) var(--ease-out)', boxShadow:interactive&&hover?(tone==='paper'?'var(--shadow-hard-lg)':'var(--shadow-hard-inv)'):'none', transform:interactive&&hover?'var(--lift)':'none', ...tones[tone], ...style }} {...rest}>
      {children}
    </div>
  );
}

function ServiceTile({ num = '01', title, children, tags = [], style, ...rest }) {
  const [hover, setHover] = useState(false);
  return (
    <div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{ display:'grid', gridTemplateColumns:'48px 1fr auto', gap:'20px', alignItems:'start', padding:'36px', background:hover?'var(--ink)':'var(--paper)', color:hover?'var(--paper)':'var(--ink)', border:'var(--bw) solid var(--ink)', borderRadius:'var(--r-lg)', transition:'background var(--dur-slow) var(--ease-ui),color var(--dur-slow) var(--ease-ui)', ...style }} {...rest}>
      <div style={{ fontFamily:'var(--font-mono)', fontSize:'var(--fs-sm)', color:hover?'var(--red)':'var(--muted)', paddingTop:6 }}>/ {num}</div>
      <div>
        <h3 style={{ fontFamily:'var(--font-display)', fontSize:'var(--fs-h3)', lineHeight:1, letterSpacing:'var(--ls-display)', textTransform:'uppercase', margin:'0 0 12px' }}>{title}</h3>
        <p style={{ color:'inherit', opacity:0.78, fontSize:'var(--fs-body-sm)', margin:'0 0 18px', maxWidth:'38ch' }}>{children}</p>
        {tags.length > 0 && (
          <div style={{ display:'flex', flexWrap:'wrap', gap:'8px' }}>
            {tags.map(t => <Tag key={t}>{t}</Tag>)}
          </div>
        )}
      </div>
      <div style={{ width:46, height:46, borderRadius:'50%', display:'grid', placeItems:'center', background:hover?'var(--red)':'var(--paper-2)', color:hover?'var(--white)':'var(--ink)', border:`1px solid ${hover?'var(--red)':'var(--ink)'}`, transform:hover?'rotate(-45deg)':'none', transition:'all var(--dur-slow) var(--ease-out)' }}>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 12L12 4M6 4h6v6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </div>
    </div>
  );
}

function BrandMark({ logoSrc, size = 38, showWord = true, word = 'CRTR.', onInk = false, style, ...rest }) {
  const [err, setErr] = useState(false);
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:'12px', ...style }} {...rest}>
      <span style={{ width:size, height:size, borderRadius:'var(--r-sm)', background:'var(--red)', display:'grid', placeItems:'center', color:'#fff', fontFamily:'var(--font-display)', fontSize:size*0.37, border:'var(--bw) solid var(--ink)', boxShadow:onInk?'var(--shadow-hard-inv-sm)':'var(--shadow-hard-sm)', overflow:'hidden' }}>
        {logoSrc && !err
          ? <img src={logoSrc} alt="" onError={()=>setErr(true)} style={{ width:'100%', height:'100%', objectFit:'cover' }} />
          : <span style={{ transform:'translateY(-1px)' }}>C.</span>}
      </span>
      {showWord && <span style={{ fontFamily:'var(--font-display)', fontSize:size*0.53, letterSpacing:'-0.02em', color:onInk?'var(--paper)':'var(--ink)' }}>{word}</span>}
    </span>
  );
}

function NavBar({ logoSrc, links = [], cta = 'Booking — Q3', ctaHref = '#', style, ...rest }) {
  return (
    <header style={{ position:'sticky', top:0, zIndex:50, background:'var(--paper)', borderBottom:'var(--bw) solid var(--ink)', ...style }} {...rest}>
      <div style={{ maxWidth:'var(--container)', margin:'0 auto', padding:'0 var(--gutter)', height:'var(--nav-h)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <a href="index.html" aria-label="CRTR. Creative Agency"><BrandMark logoSrc={logoSrc} size={38} /></a>
        <nav aria-label="Main" style={{ display:'flex', gap:'36px', alignItems:'center' }}>
          {links.map(l => <NavLink key={l.label} href={l.href}>{l.label}</NavLink>)}
        </nav>
        <a href={ctaHref} style={{ textDecoration:'none' }}><Badge tone="ink" dot>{cta}</Badge></a>
      </div>
    </header>
  );
}

function NavLink({ href, children }) {
  const [hover, setHover] = useState(false);
  return (
    <a href={href} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{ fontSize:'var(--fs-sm)', fontWeight:'var(--fw-medium)', color:hover?'var(--red)':'inherit', transition:'color var(--dur-fast) var(--ease-ui)' }}>
      {children}
    </a>
  );
}

function WorkCard({ meta, title, tone = 'ink', href = '#', style, ...rest }) {
  const [hover, setHover] = useState(false);
  const tones = {
    ink:      { background:'var(--ink)', color:'#fff' },
    red:      { background:'var(--red)', color:'#fff' },
    redGrad:  { background:'linear-gradient(135deg,var(--red) 0%,var(--red-darker) 100%)', color:'#fff' },
    darkGrad: { background:'linear-gradient(135deg,#0B0B0C 0%,#2a2a2d 100%)', color:'#fff' },
    steel:    { background:'var(--steel)', color:'#fff' },
    gold:     { background:'var(--gold)', color:'var(--ink)' },
    paper:    { background:'var(--paper-3)', color:'var(--ink)' },
  };
  return (
    <a href={href} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{ position:'relative', display:'flex', flexDirection:'column', justifyContent:'flex-end', minHeight:200, border:'var(--bw) solid var(--ink)', borderRadius:'var(--r-lg)', overflow:'hidden', padding:22, transition:'transform var(--dur-slow) var(--ease-out),box-shadow var(--dur-slow) var(--ease-out)', boxShadow:hover?'var(--shadow-hard-lg)':'none', transform:hover?'var(--lift-lg)':'none', ...tones[tone], ...style }} {...rest}>
      <div style={{ fontFamily:'var(--font-mono)', fontSize:'var(--fs-2xs)', textTransform:'uppercase', letterSpacing:'0.08em', opacity:0.85 }}>{meta}</div>
      <div style={{ fontFamily:'var(--font-display)', fontSize:'22px', letterSpacing:'-0.02em', textTransform:'uppercase', marginTop:4, lineHeight:1 }}>{title}</div>
    </a>
  );
}

function Marquee({ items = [], speed = 28, star = '★', style, ...rest }) {
  const run = (
    <span style={{ display:'inline-flex', alignItems:'center', gap:'40px' }}>
      {items.map((it, i) => (
        <React.Fragment key={i}>
          <span>{it}</span>
          <span style={{ color:'var(--red)', fontSize:'0.7em' }}>{star}</span>
        </React.Fragment>
      ))}
    </span>
  );
  return (
    <div style={{ borderTop:'var(--bw) solid var(--ink)', borderBottom:'var(--bw) solid var(--ink)', background:'var(--ink)', color:'var(--paper)', overflow:'hidden', ...style }} {...rest}>
      <div className="crtr-marquee-track"
