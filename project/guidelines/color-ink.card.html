<!-- @dsCard group="Colors" viewport="700x150" name="Ink · Authority" subtitle="Near-black for text, borders, and dark sections" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--paper); padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .sw { border: var(--bw) solid var(--ink); border-radius: var(--r-sm); overflow: hidden; }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--paper); }
  .name { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--ink); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="meta"><div class="name">Ink</div><div class="hex">#0B0B0C</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-2)"></div><div class="meta"><div class="name">Ink 2</div><div class="hex">#1A1A1C</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-3)"></div><div class="meta"><div class="name">Ink 3 · hairline</div><div class="hex">#2A2A2D</div></div></div>
</div>
</body>
</html>
