<!-- @dsCard group="Type" viewport="700x210" name="Body · Archivo" subtitle="Modern grotesque — legible, confident body & UI" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--paper); padding: 24px; color: var(--ink); }
  .meta { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 12px; }
  .lead { font-family: var(--font-sans); font-size: 20px; font-weight: 500; line-height: 1.45; margin: 0 0 12px; max-width: 60ch; }
  .body { font-family: var(--font-sans); font-size: 16px; line-height: 1.55; color: var(--ink-2); margin: 0; max-width: 64ch; }
  .weights { font-family: var(--font-sans); margin-top: 14px; font-size: 18px; display: flex; gap: 18px; }
  .weights span:nth-child(1){font-weight:400} .weights span:nth-child(2){font-weight:500}
  .weights span:nth-child(3){font-weight:600} .weights span:nth-child(4){font-weight:700} .weights span:nth-child(5){font-weight:900}
</style>
</head>
<body>
<div class="meta">Archivo · 400 / 500 / 600 / 700 / 900</div>
<p class="lead">A four-person creator studio shipping bold video, motion, web and graphic work.</p>
<p class="body">No decks of decks — just the thing, made well, on time. Designed and built by the same people, so nothing gets lost in the handoff.</p>
<div class="weights"><span>Regular</span><span>Medium</span><span>Semibold</span><span>Bold</span><span>Black</span></div>
</body>
</html>
