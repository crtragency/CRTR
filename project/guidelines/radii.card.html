<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Modest on surfaces, pill on controls" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--paper); padding: 24px; }
  .row { display: flex; gap: 20px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 72px; height: 56px; background: var(--paper-2); border: var(--bw) solid var(--ink); }
  .pill { width: 100px; height: 40px; border-radius: 999px; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 8px; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:var(--r-xs)"></div><div class="label">xs · 6</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-sm)"></div><div class="label">sm · 8</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-md)"></div><div class="label">md · 12</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-lg)"></div><div class="label">lg · 18</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-xl)"></div><div class="label">xl · 24</div></div>
  <div class="item"><div class="box pill"></div><div class="label">pill · 999</div></div>
</div>
</body>
</html>
