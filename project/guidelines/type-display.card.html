<!-- @dsCard group="Type" viewport="700x190" name="Display · Archivo Black" subtitle="Uppercase, tight, confident — the headline voice" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--paper); padding: 24px; }
  .meta { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 10px; }
  .big { font-family: var(--font-display); font-size: 72px; line-height: .92; letter-spacing: -0.045em; text-transform: uppercase; color: var(--ink); margin: 0; }
  .big .red { color: var(--red); }
  .big .stroke { -webkit-text-stroke: 1.5px var(--ink); color: transparent; }
</style>
</head>
<body>
<div class="meta">Archivo Black · 900 · display</div>
<h1 class="big">Refuse to <span class="red">sit</span> <span class="stroke">still.</span></h1>
</body>
</html>
