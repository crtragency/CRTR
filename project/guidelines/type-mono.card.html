<!-- @dsCard group="Type" viewport="700x150" name="Mono · JetBrains Mono" subtitle="Eyebrows, tags, meta, numerics — the technical layer" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--paper); padding: 24px; }
  .meta { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 14px; }
  .stack { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .eyebrow { font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink); background: var(--paper-2); border: 1.5px solid var(--ink); padding: 6px 12px; border-radius: 999px; }
  .tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; padding: 5px 10px; border: 1px solid var(--ink); border-radius: 999px; color: var(--ink); }
  .secnum { font-family: var(--font-mono); font-size: 12px; letter-spacing: .1em; color: var(--red); }
  .secnum::before { content: '/ '; color: var(--ink); opacity: .4; }
</style>
</head>
<body>
<div class="meta">JetBrains Mono · 400 / 500 / 700</div>
<div class="stack">
  <span class="eyebrow">Est. 2021 · Creator-led</span>
  <span class="secnum">Services 01</span>
  <span class="tag">After Effects</span>
  <span class="tag">Next.js</span>
  <span class="tag">120+ shipped</span>
</div>
</body>
</html>
